[account]
id = "${protocol}:${username}@${domain}"
contact_uri = "${protocol}:${username}@${domain}"
registrar = "${protocol}:${domain}"
username = "${username}"
password = "${env:RPJS_TELNYX_PASSWORD}"
realm = "*"

[transport]
sip_transport = "udp"
local_port = 0

[media]
null_audio = true

[runtime]
call = "${protocol}:${test_number}@${domain}"
duration_seconds = 30
log_level = 0
