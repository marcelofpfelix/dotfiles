# herdr configuration
# Mirrors desktop/.tmux.conf where Herdr has an equivalent concept.

onboarding = false

[theme]
name = "catppuccin"

[terminal]
new_cwd = "follow"

[update]
channel = "stable"
version_check = false
manifest_check = false

[keys]
prefix = "ctrl+a"

# tmux-like reload/help/session controls.
help = "prefix+?"
reload_config = "prefix+r"
workspace_picker = "prefix+s"
rename_workspace = "prefix+shift+w"
previous_workspace = "prefix+left"
next_workspace = "prefix+right"
switch_workspace = "prefix+shift+1..9"

# tmux windows map to Herdr tabs.
new_tab = "prefix+c"
rename_tab = "prefix+comma"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
close_tab = "prefix+ampersand"
edit_scrollback = "prefix+e"

# tmux pane navigation and copy-mode muscle memory.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
split_vertical = "prefix+percent"
split_horizontal = "prefix+double_quote"
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+shift+r"
toggle_sidebar = "prefix+b"

# Agent pane monitor, matching the tmux prefix bindings as closely as Herdr allows.
focus_agent = "prefix+alt+1..9"

[[keys.command]]
key = "prefix+shift+a"
type = "pane"
command = "agent-tmux status"

[[keys.command]]
key = "prefix+shift+e"
type = "pane"
command = "agent-tmux events"

[[keys.command]]
key = "prefix+alt+w"
type = "pane"
command = "agent-tmux watch"

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[ui]
mouse_capture = true
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
accent = "#cba6f7"
confirm_close = true
prompt_new_tab_name = false

[ui.toast]
delivery = "terminal"
delay_seconds = 1

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true

[experimental]
pane_history = false
