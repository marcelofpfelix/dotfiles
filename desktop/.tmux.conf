# refresh tmux config
unbind r
bind r source-file ~/.tmux.conf

# remap prefix from ctrl+b to ctrl+s
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# don't rename windows automatically
set -g allow-rename off

# vim-like pane switching
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# extra bindings
# sync
bind X setw synchronize-panes
# Toggle mouse with ^M
bind C-m set -g mouse
# open tmux popup
bind u run-shell 'popuptmux' #TODO: need to test in v3.4
set -g terminal-overrides ',xterm-256color:RGB'

set -s escape-time 0
# Sane scrolling
# fix paste identation
# set -g status-utf8 on

# TODO:
# review yank plugins
# configure continuum/resurrect
# configure popup

# ##############################################################################
# List of plugins - prefix + I to fetch the plugins
# https://github.com/tmux-plugins/list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'sainnhe/tmux-fzf' # to review
# set -g @plugin 'wfxr/tmux-fzf-url' # to review
# set -g @plugin 'fcsonline/tmux-thumbs' # to review


# ##############################################################################
# https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l
# #############################################################################'

# Completely kill tmux and restart (killall tmux).
# Ensure every @catppuccin.* option is being set before the plugin is loaded. Loading occurs where you have run in your config file.
# Double check for typos. There are two "c"s and two "p"s in "catppuccin".
# Do not use -o to set options that begin with @. The -o flag means that the option will not be set if it has already been set. You do not need this in your config file.
# Double check that any option that does not start with @ is set after the plugin is loaded.

#session/window/zoom user/host client sync
# 
set -g @catppuccin_window_status_style "custom"#"rounded" #"custom"
set -g @catppuccin_status_background "none"

set -g window-status-separator ""
set -g status-position top
set -g status-left ""
set -g status-left-length 100
set -g status-right-length 100
set -g status-bg default
set -g status-style bg=default


# Default window colors
# Left
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_left_separator "#[fg=#{@thm_surface_0},bg="default"]█#[bg="default",fg=#{@thm_surface_0}]"
set -g @catppuccin_window_middle_separator "#[fg=#{@thm_surface_0},bg="default"]"█"#[bg="default",fg=#{@thm_surface_0}]"
# Right
set -g @catppuccin_window_number_color "#{@thm_lavender}"
set -g @catppuccin_window_right_separator "#[bg="default",fg=#{@thm_lavender}]#[bg="default",fg=#{@thm_lavender}]"

# Current window colors
# Left
set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"
set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_surface_1},bg="default"]█#[bg="default",fg=#{@thm_surface_1}]"
set -g @catppuccin_window_current_middle_separator "#[fg=#{@thm_surface_1},bg="default"]"█"#[bg="default",fg=#{@thm_surface_1}]"
# Right
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_right_separator "#[bg="default",fg=#{@thm_mauve}]#[bg="default",fg=#{@thm_mauve}]"




#set -g @catppuccin_window_left_separator ""
#set -g @catppuccin_window_left_separator "█"
#set -g @catppuccin_window_right_separator ""
#set -g @catppuccin_window_middle_separator " █" # █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_connect_separator "yes"

#set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
#set -g @catppuccin_window_current_text "#W"
#set -g @catppuccin_window_default_fill "none"
#set -g @catppuccin_window_current_fill "all"

#set -g @catppuccin_status_modules_right "application session"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator " "

#set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_connect_separator "yes"

set -g @catppuccin_status_fill "icon"

set -g @catppuccin_window_status "icon"

# ##############################################################################

# Make sure you load the catppuccin theme prior to setting the status-left and/or status-* options. This ensures the catppuccin options (such as colors and status modules) are defined so they can then be used.

#run 'll ~/.tmux/plugins/tmux/catppuccin.tmux'

#source "~/.tmux/plugins/tmux/utils/status_module.conf"
set -g status-right "#{E:@catppuccin_status_application}"
#set -ag status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
#set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#(NO_COLOR=1 ~/bin/tbar ~/bin/vpn)"

set -agF status-right "#{E:@catppuccin_status_cpu}"

set -g @plugin 'tmux-plugins/tmux-cpu'

# Load extra if env var is set
%if "#{REMOTE_SERVER}"
    source-file ~/.config/tmux/extra.conf
%endif

