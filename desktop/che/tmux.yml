# tmux

## key bindings

prefix: C-a

session:
    (: previous session
    ): next session
    L: last (previously used) session
    s: choose a session from a list
    $: rename session

window:
    C-c: Create a new window
    C-w: Choose a window from a list
    C-n: Change to the next window
    C-p: Change to the previous window
    C-f: Find a window
    C-,: Rename the current window
    C-&: Kill the current window

panes:
    x: Kill the current pane
    X: synchronize-panes
    C-%: split vertically
    C-": split horizontally
    z: Zoom into a pane

others:
    C-m: Toggle mouse mode

### plugins

tmux-open:
    o: Open a file or URL
    C-o: Open with the editor

tmux-yank:
    y: Copy selection to system clipboard
    Y: Copy selection, and pasting it to the command line
    C-y: Copy command to system clipboard

tmux-copycat:
    C-?: search up
    C-/: search down
    n/N: next/previous match
    C-ctrl-f: simple file search
    C-ctrl-u: url search
    C-ctrl-d: digit search
    C-ctrl-i: ip address search

## cli commands

cli_session:
    new -s name: Start a new named session
    attach -t name: Attach to the most recently used session
    kill-session: Kill the current session
    switch-client -t name: Switch to an existing session

cli-commands:
    kill-server: Kill the server; all sessions and windows will be terminated

agent-monitor:
    A: Pick and focus a Codex, Claude Code, or OpenCode pane
    M-A: Show Codex, Claude Code, and OpenCode pane states in a popup
    E: Show native hook events in a popup
    status: agent-tmux status
    status-cached: agent-tmux status --cached
    status-blocked: agent-tmux status --state blocked
    group-session: agent-tmux group session
    group-repo: agent-tmux group repo
    bar: agent-tmux bar
    bar-counts: AGENT_TMUX_BAR_MODE=counts agent-tmux bar
    bar-agents: AGENT_TMUX_BAR_MODE=agents agent-tmux bar
    bar-sessions: AGENT_TMUX_BAR_MODE=sessions agent-tmux bar
    bar-repos: AGENT_TMUX_BAR_MODE=repos agent-tmux bar
    window-icon: agent-tmux window-icon "#{session_name}:#{window_index}"
    focus: agent-tmux focus %pane_id
    switch: agent-tmux switch
    open: agent-tmux open codex ~/gwt/org/repo/main
    open-new: agent-tmux open --new --session dev --name codex:repo codex ~/gwt/org/repo/main
    restart: agent-tmux restart %pane_id
    keys: agent-tmux keys
    switcher-keys: Enter focus, C-r refresh, C-e send Enter, C-n rename window, C-k kill pane, C-y copy, C-w open path, C-x restart
    why: agent-tmux why %pane_id
    events: agent-tmux events
    events-clear: agent-tmux events-clear
    notify: agent-tmux notify
    notify-test: agent-tmux notify-test
    notify-debug: agent-tmux notify-debug
    doctor: agent-tmux doctor
    cache-clear: agent-tmux cache-clear
    watch: agent-tmux watch
