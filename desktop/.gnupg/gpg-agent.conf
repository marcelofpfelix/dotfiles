# pinentry: the program that prompts for the passphrase.
# available: pinentry-tty, pinentry-curses, pinentry-gnome3, pinentry-gtk-2
# pinentry-tmux: custom wrapper that redirects to a dedicated tmux pane,
#   falls back to pinentry-tty if the pane is not available.
#   run `pinentry-tmux-setup [session]` to create the pane.
#pinentry-program /usr/bin/pinentry-tty
#pinentry-program ~/bin/pinentry-tmux

# idle timeout: cached passphrase expires after N seconds of not being used.
# the timer resets every time the key is used.
# default: 600 (10 min)
default-cache-ttl 1500

# absolute timeout: passphrase expires after N seconds regardless of usage.
# even if the key is used continuously, re-prompt after this.
# default: 7200 (2 hrs)
#max-cache-ttl 7200

# idle timeout for SSH keys managed by gpg-agent.
# default: 1800 (30 min)
#default-cache-ttl-ssh 1800

# absolute timeout for SSH keys managed by gpg-agent.
# default: 7200 (2 hrs)
#max-cache-ttl-ssh 7200

# allow gpg-preset-passphrase to cache passphrases programmatically,
# similar to ssh-add. useful for scripting or pre-seeding at login.
allow-preset-passphrase

# allow --pinentry-mode loopback so callers can supply the passphrase
# directly via stdin instead of through pinentry.
#allow-loopback-pinentry

# how long pinentry waits for user input before giving up (seconds).
# 0 = no timeout.
#pinentry-timeout 0
